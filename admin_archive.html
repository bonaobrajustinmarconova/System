<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NestQC Admin · Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin_common.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    .archive-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-soft);
    }
    .archive-empty .empty-icon { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.5; }
    .archive-empty p { font-size: 0.88rem; line-height: 1.6; }

    .dorm-item.archived {
      border-color: rgba(201,168,76,0.15);
      opacity: 0.88;
    }
    .dorm-item.archived:hover {
      border-color: rgba(201,168,76,0.4);
      opacity: 1;
    }

    .archive-count {
      font-size: 0.78rem;
      color: var(--text-soft);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-grid"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="pictures/nestqc_logo.png" alt="NestQC Logo" class="sidebar-logo-img" />
    </div>
    <nav class="sidebar-nav">
      <a href="admin_dashboard.html" class="nav-icon">
        <span>☰</span><span class="nav-label">Dashboard</span>
        <span class="nav-tooltip">Dashboard</span>
      </a>
      <a href="admin_dorms.html" class="nav-icon">
        <span>🏠</span><span class="nav-label">Manage Dorms</span>
        <span class="nav-tooltip">Manage Dorms</span>
      </a>
      <a href="admin_users.html" class="nav-icon">
        <span>👥</span><span class="nav-label">Users</span>
        <span class="nav-tooltip">Users</span>
      </a>
      <a href="admin_chat.html" class="nav-icon">
        <span>💬</span><span class="nav-label">Support Chat</span>
        <span class="nav-tooltip">Support Chat</span>
      </a>
      <a href="admin_add_dorm.html" class="nav-icon">
        <span>➕</span><span class="nav-label">Add Dorm</span>
        <span class="nav-tooltip">Add Dorm</span>
      </a>
      <a href="admin_archive.html" class="nav-icon active">
        <span>🗃️</span><span class="nav-label">Archive</span>
        <span class="nav-tooltip">Archive</span>
      </a>
    </nav>
    <div class="nav-icon" onclick="toggleTheme()">
      <span class="icon-dark">🌙</span>
      <span class="icon-light">☀️</span>
      <span class="nav-label icon-dark">Light Mode</span>
      <span class="nav-label icon-light">Dark Mode</span>
      <span class="nav-tooltip icon-dark">Switch to Light</span>
      <span class="nav-tooltip icon-light">Switch to Dark</span>
    </div>
    <div class="sidebar-bottom">
      <div class="nav-icon" onclick="logout()">
        <span>👤</span><span class="nav-label">Logout</span>
        <span class="nav-tooltip">Logout</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-heading">
      <div class="page-title">Archive</div>
      <div class="page-subtitle">Archived dorms are hidden from the public site. Restore them anytime.</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Archived Dorms</div>
        <span class="archive-count" id="archiveCount">0 dorms</span>
      </div>
      <div class="card-body">
        <div class="dorm-list" id="archiveList">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="theme.js"></script>
  <script>
    (async () => {
      try {
        const res = await fetch('session.php');
        const data = await res.json();
        if (!data.loggedIn || data.user.role !== 'admin') window.location.href = 'login.html';
      } catch { window.location.href = 'login.html'; }
    })();

    function showToast(msg, err = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${err ? 'error' : ''} show`;
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function logout() { await fetch('logout.php'); window.location.href = 'login.html'; }

    async function loadArchive() {
      const list = document.getElementById('archiveList');
      list.innerHTML = '<p style="color:var(--text-soft);padding:8px 0;">Loading…</p>';
      try {
        const res = await fetch('get_archived_dorms.php');
        const data = await res.json();
        if (!data.success) throw new Error();

        const dorms = data.dorms;
        document.getElementById('archiveCount').textContent =
          dorms.length === 1 ? '1 dorm' : `${dorms.length} dorms`;

        if (!dorms.length) {
          list.innerHTML = `
            <div class="archive-empty">
              <div class="empty-icon">🗃️</div>
              <p>No archived dorms yet.<br>Archived dorms will appear here.</p>
            </div>`;
          return;
        }

        list.innerHTML = dorms.map(d => `
          <div class="dorm-item archived" id="dorm-${d.dormID}">
            <div class="dorm-info">
              <div class="dorm-name" style="display:flex;align-items:center;gap:10px;">
                ${d.dname}
                <span class="archived-badge">🗃️ Archived</span>
              </div>
              <div class="dorm-meta">📍 ${d.address || 'Quezon City'} · ⭐ ${d.average_rating} · ₱${Number(d.price).toLocaleString()}/mo</div>
            </div>
            <div class="dorm-actions">
              <button class="btn btn-warning" onclick="restoreDorm(${d.dormID})">↩ Restore</button>
            </div>
          </div>`).join('');

      } catch (e) {
        list.innerHTML = '<p style="color:#e07070;padding:8px 0;">Failed to load archived dorms.</p>';
      }
    }

    async function restoreDorm(id) {
      if (!confirm('Restore this dorm? It will become visible on the public site again.')) return;
      try {
        const res = await fetch('restore_dorm.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dormID: id })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Dorm restored and is now live.');
          loadArchive();
        } else {
          showToast(data.message || 'Restore failed.', true);
        }
      } catch (e) {
        showToast('Network error.', true);
      }
    }

    loadArchive();
  </script>
</body>
</html>
